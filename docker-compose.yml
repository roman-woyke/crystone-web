version: '3.8'

# Local MySQL for Prisma dev/migrations against the shared schema (see
# README.md). Point DATABASE_URL in .env at this instance, e.g.
# mysql://root:rootpass@localhost:3306/local_site_db

services:
  db:
    image: mysql:8.0
    container_name: leaderboard_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: local_site_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: leaderboard_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass
    depends_on:
      - db

volumes:
  db_data:
