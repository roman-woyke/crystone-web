version: '3.8'

services:
  web:
    build:
      context: ./docker
    container_name: site_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/config.local.php:/var/www/config.php:ro
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=local_site_db
      - DB_USER=root
      - DB_PASS=rootpass

  db:
    image: mysql:8.0
    container_name: site_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: local_site_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: site_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass
    depends_on:
      - db

volumes:
  db_data:
